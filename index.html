<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="pageTitle">摘叶飞镖的个人主页</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo" data-i18n="logoText">摘叶飞镖</div>
      <div class="controls">
        <div class="custom-lang-switch" id="lang-switch-container">
          <button class="lang-toggle" id="lang-toggle">
            <span id="current-lang">中文</span>
            <svg viewBox="0 0 24 24" class="chevron">
              <path
                d="M6 9l6 6 6-6"
                stroke="currentColor"
                stroke-width="2"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <ul class="lang-menu" id="lang-menu">
            <li data-value="zh" class="active">中文</li>
            <li data-value="en">English</li>
          </ul>
        </div>
        <button id="theme-switch" aria-label="Toggle Theme">
          <svg class="sun-icon" viewBox="0 0 24 24">
            <path
              d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18.75a.75.75 0 01.75.75V21.75a.75.75 0 01-1.5 0V19.5a.75.75 0 01.75-.75zM6.166 17.834a.75.75 0 001.06 1.06l1.59-1.591a.75.75 0 10-1.06-1.061l-1.591 1.59zM4.5 12a.75.75 0 01-.75-.75H1.5a.75.75 0 010-1.5h2.25a.75.75 0 01.75.75zM6.166 6.166a.75.75 0 011.06-1.061l1.59 1.591a.75.75 0 11-1.061 1.06l-1.59-1.59z"
            />
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24">
            <path
              d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z"
            />
          </svg>
        </button>
      </div>
    </nav>

    <header class="hero reveal">
      <h1 data-i18n="heroTitle">当代码有了色彩</h1>
      <p data-i18n="heroSubtitle">艺术创作与开源世界</p>
    </header>

    <section id="artworks" class="reveal">
      <h2 data-i18n="artTitle">个人画作</h2>
      <p class="section-subtitle" data-i18n="artSubtitle">
        用线条勾勒时光，用明暗泼墨心漾
      </p>
      <div class="gallery-grid">
        <div class="art-card">
          <img
            src="https://raw.githubusercontent.com/jayfunc/image-hosting/main/2020.09.02-天气之子.jpg"
            alt="Art 1"
          />
          <div class="art-overlay" data-i18n="art1">天气之子</div>
        </div>
        <div class="art-card">
          <img
            src="https://raw.githubusercontent.com/jayfunc/image-hosting/main/2019.12.08-大白.jpg"
            alt="Art 2"
          />
          <div class="art-overlay" data-i18n="art2">超能陆战队</div>
        </div>
        <div class="art-card">
          <img
            src="https://raw.githubusercontent.com/jayfunc/image-hosting/main/疯狂动物城.jpg"
            alt="Art 3"
          />
          <div class="art-overlay" data-i18n="art3">疯狂动物城</div>
        </div>
      </div>
    </section>

    <section id="projects" class="reveal">
      <h2 data-i18n="projTitle">开源项目</h2>
      <div class="project-grid">
        <div class="project-card">
          <h3 data-i18n="proj1Title">BetterLyrics</h3>
          <p data-i18n="proj1Desc">
            BetterLyrics
            是一款优雅且高度自定义的歌词可视化与全能音乐播放应用，基于 WinUI3 /
            Win2D 构建。
          </p>
          <div class="tags">
            <span>WinUI 3</span>
            <span>C#</span>
          </div>
          <a
            href="https://github.com/jayfunc/BetterLyrics"
            target="_blank"
            class="btn"
            data-i18n="viewGithub"
            >View on GitHub</a
          >
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 Zhe Fang</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
